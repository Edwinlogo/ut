<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <!-- ====== META BÁSICO ====== -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Horario Académico · Arquitectura UT</title>
  <meta name="description" content="Horario académico interactivo para Arquitectura 2026 A - Universidad del Tolima. Consulta materias, docentes y horarios.">

  <!-- ====== GOOGLE FONTS (Inter — tipografía moderna) ====== -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

  <!-- ====== ESTILOS EXTERNOS ====== -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- ============================================================
       HEADER — Barra superior con título y botón de menú
       ============================================================ -->
  <header>
    <h1>Horario Académico</h1>
    <p>Arquitectura 2026 A · Universidad del Tolima</p>

    <!-- Botón hamburguesa (☰) para abrir el drawer -->
    <button class="menu-btn" id="menuBtn" onclick="toggleDrawer()" aria-label="Menú">
      <span></span><span></span><span></span>
    </button>
  </header>


  <!-- ============================================================
       DRAWER — Menú lateral deslizable
       Contiene: toggle de tema, links rápidos, info del semestre.
       ============================================================ -->

  <!-- Overlay oscuro detrás del drawer (cierra al hacer clic) -->
  <div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>

  <!-- Panel drawer -->
  <div class="drawer" id="drawer">

    <!-- Encabezado del drawer -->
    <div class="drawer-header">
      <h3>⚙️ Menú</h3>
      <p>Accesos rápidos y configuración</p>
    </div>

    <!-- Cuerpo del drawer (scrollable) -->
    <div class="drawer-body">

      <!-- Sección: Apariencia (toggle de tema) -->
      <div class="drawer-section-label">Apariencia</div>
      <div class="theme-switch" onclick="toggleTheme()">
        <div class="di-left">
          <div class="di-icon di-red" id="themeIcon">🌙</div>
          <div class="di-text">
            Modo oscuro
            <small id="themeLabel">Activo</small>
          </div>
        </div>
        <div class="toggle-track on" id="toggleTrack">
          <div class="toggle-knob"></div>
        </div>
      </div>

      <!-- Sección: Accesos rápidos (se genera desde data.js) -->
      <div class="drawer-section-label">Accesos</div>
      <div id="drawer-links">
        <!-- Los enlaces se insertan dinámicamente por app.js -->
      </div>

      <!-- Sección: Info del semestre (estática) -->
      <div class="drawer-section-label">Info</div>
      <div class="drawer-item" style="cursor:default">
        <div class="di-icon di-gold">📅</div>
        <div class="di-text">
          Semestre activo
          <small>2026 · Arquitectura · 18 créditos</small>
        </div>
      </div>

    </div><!-- /drawer-body -->

    <!-- Pie del drawer -->
    <div class="drawer-footer">dcedwin.com</div>
  </div><!-- /drawer -->


  <!-- ============================================================
       STATS — Tarjetas de estadísticas (Horas, Créditos, Materias)
       Se generan dinámicamente desde data.js
       ============================================================ -->
  <div class="stats" id="stats-container">
    <!-- Contenido generado por app.js → renderStats() -->
  </div>


  <!-- ============================================================
       VIEW TOGGLE — Botones para cambiar entre vista diaria/semanal
       ============================================================ -->
  <div class="view-toggle">
    <button class="view-btn" onclick="switchView('daily',this)">📋 Por Día</button>
    <button class="view-btn active" onclick="switchView('weekly',this)">🗓️ Semana</button>
  </div>


  <!-- ============================================================
       VISTA DIARIA — Tarjetas de clase organizadas por día
       Se genera dinámicamente desde data.js
       ============================================================ -->
  <div id="daily-view" style="display:none">

    <!-- Tabs de días (Lunes a Viernes) -->
    <div class="tabs">
      <button class="tab active" onclick="showDay('lunes',this)">Lunes</button>
      <button class="tab" onclick="showDay('martes',this)">Martes</button>
      <button class="tab" onclick="showDay('miercoles',this)">Miércoles</button>
      <button class="tab" onclick="showDay('jueves',this)">Jueves</button>
      <button class="tab" onclick="showDay('viernes',this)">Viernes</button>
    </div>

    <!-- Contenedor donde se insertan las tarjetas de cada día -->
    <div id="daily-cards">
      <!-- Contenido generado por app.js → renderDailyView() -->
    </div>

  </div><!-- /daily-view -->


  <!-- ============================================================
       VISTA SEMANAL — Grilla completa de la semana
       Se genera dinámicamente desde data.js
       ============================================================ -->
  <div id="weekly-view" style="display:block">

    <!-- Grilla donde se insertan las celdas -->
    <div class="week-grid" id="weekly-grid">
      <!-- Contenido generado por app.js → renderWeeklyView() -->
    </div>

    <p class="tip-hint">💡 Toca cualquier materia para ver detalles · Toca la foto para ampliarla</p>
  </div><!-- /weekly-view -->


  <!-- ============================================================
       MODAL — Detalle de materia (popup centrado)
       Se muestra al hacer clic en un pill de la grilla o tarjeta.
       ============================================================ -->
  <div class="modal-overlay" id="modal" onclick="if(event.target===this)this.classList.remove('show')">
    <div class="modal">
      <button class="modal-close" onclick="document.getElementById('modal').classList.remove('show')">✕</button>
      <div id="modal-photo-wrap"></div>
      <h3 id="modal-name"></h3>
      <div class="modal-divider"></div>
      <div class="modal-info" id="modal-body"></div>
    </div>
  </div>


  <!-- ============================================================
       LIGHTBOX — Vista ampliada de fotos de docentes
       Pantalla completa al hacer clic en una foto.
       ============================================================ -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <div class="lightbox-close" onclick="closeLightbox()">✕</div>
    <img id="lightbox-img" src="" alt="">
    <div class="lightbox-name" id="lightbox-name"></div>
  </div>


  <!-- ============================================================
       SCRIPTS EXTERNOS
       Orden importante: data.js ANTES de app.js
       (app.js necesita SCHEDULE_DATA definido en data.js)
       ============================================================ -->
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
